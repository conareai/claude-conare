name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JSON manifests parse
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json .mcp.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "ok $f"
          done

      - name: scripts parse
        run: |
          node --check scripts/session-start.mjs
          node --check scripts/mcp-bridge.mjs

      - name: "bridge smoke: signed-out ⇒ local setup server"
        run: |
          out=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26"}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | HOME=$(mktemp -d) node scripts/mcp-bridge.mjs)
          echo "$out" | grep -q '"serverInfo"' && echo "initialize ok"
          echo "$out" | grep -q '"name":"setup"' && echo "setup tool ok"

      - name: "hook smoke: no credentials ⇒ empty output, exit 0"
        run: |
          out=$(echo '{}' | HOME=$(mktemp -d) node scripts/session-start.mjs)
          test -z "$out" && echo "silent, as designed"

      - name: "hook smoke: unreachable API ⇒ empty output, exit 0"
        run: |
          tmp=$(mktemp -d)
          mkdir -p "$tmp/.conare"
          echo '{"apiKey":"cmem_ci_smoke"}' > "$tmp/.conare/config.json"
          out=$(echo '{}' | HOME="$tmp" CONARE_API_URL="http://127.0.0.1:9" node scripts/session-start.mjs)
          test -z "$out" && echo "silent, as designed"

      - name: plugin validate
        run: npx -y @anthropic-ai/claude-code plugin validate .
